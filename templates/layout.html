{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>{{template "title" .}}</title>
    <meta name="description" content="App privacy policies for BISICSL applications, ensuring strict compliance with Google Play Store guidelines.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0b0f19">

    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{template "title" .}}">
    <meta property="og:description" content="App privacy policies for BISICSL applications.">
    <meta property="og:site_name" content="BISICSL Privacy Policies">

    <!-- Fonts (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Sticky Header -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="logo-link" id="home-link">
                <div class="logo-icon">B</div>
                <span>BISICSL</span>
            </a>
            <div class="nav-actions">
                <button class="btn-toggle" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Light/Dark Mode">
                    <!-- Icon loaded by JS -->
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content Area -->
    <main class="main-content">
        {{template "content" .}}
    </main>

    <!-- Global Footer -->
    <footer class="footer">
        <div class="footer-container">
            <span class="footer-brand">BISICSL</span>
            <span class="footer-text">
                &copy; {{.CurrentYear}} Baladebjew Multi Purpose Multi State Cooperative Society Limited. All rights reserved.
            </span>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/main.js"></script>
</body>
</html>
{{end}}
